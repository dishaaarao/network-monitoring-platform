apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-monitoring-app
  namespace: network-monitoring
  labels:
    app: network-monitoring-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: network-monitoring-app
  template:
    metadata:
      labels:
        app: network-monitoring-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: network-monitoring-app
          image: network-monitoring-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: network-monitoring-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
