apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: network-monitoring-ingress
  namespace: network-monitoring
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: monitoring.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: network-monitoring-app
                port:
                  number: 80
